name: 📊 Update ETF Data

on:
  schedule:
    - cron: '0 14 * * 1-5'   # 10am EST — after market open
    - cron: '0 22 * * 1-5'   # 6pm EST  — after market close
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Single ticker (leave empty for all)'
        required: false
      update_history:
        description: 'Update price history?'
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (no DB writes)?'
        type: boolean
        default: false

jobs:
  update:
    name: Update ETF Data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Run ETF update
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ALPHA_VANTAGE_KEY:   ${{ secrets.ALPHA_VANTAGE_KEY }}
          FMP_KEY:             ${{ secrets.FMP_KEY }}
        run: |
          ARGS=""
          [ -n "${{ github.event.inputs.ticker }}" ] && ARGS="$ARGS --ticker=${{ github.event.inputs.ticker }}"
          [ "${{ github.event.inputs.update_history }}" = "true" ] && ARGS="$ARGS --history"
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          node scripts/update-etf-data.js $ARGS

      - name: Open issue on total failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 ETF update failed — ${new Date().toISOString().split('T')[0]}`,
              body: `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug'],
            });
